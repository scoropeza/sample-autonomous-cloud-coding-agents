min_version = "2026.2.6"

[tools]
python = "3.13"
uv = "latest"
"aqua:aquasecurity/trivy" = "v0.69.3"

[env]
_.python.venv = { path = ".venv", create = true }
PROJECT_NAME = "{{ config_root | basename }}"

[tasks]
install = "uv sync --all-groups"

[tasks.info]
description = "Print project information"
run = '''
echo "Project: $PROJECT_NAME"
'''

# QUALITY

[tasks.lint]
description = "Lint with ruff"
run = "uvx ruff check"

[tasks."lint:fix"]
description = "Lint and auto-fix"
run = "uvx ruff check --fix"

[tasks.format]
description = "Format with ruff"
run = "uvx ruff format"

[tasks."format:check"]
description = "Check formatting"
run = "uvx ruff format --check"

[tasks.typecheck]
description = "Type check with ty"
run = "uvx ty check"

[tasks.test]
description = "Run tests with pytest"
run = "uv run pytest"

# SECURITY

[tasks."security:bandit"]
description = "Run Bandit"
run = "uvx bandit[toml] -c pyproject.toml -r . --severity-level=high"

[tasks."security:image"]
description = "Scan container image with trivy"
run = [
  "docker image inspect bgagent-local:latest >/dev/null 2>&1 || (ARCH=\"$(uname -m)\"; PLATFORM=\"linux/arm64\"; if [ \"$ARCH\" = \"x86_64\" ]; then PLATFORM=\"linux/amd64\"; fi; docker build --build-arg TARGETPLATFORM=\"$PLATFORM\" --build-arg CACHE_BUST=\"$(date +%s)\" -t bgagent-local:latest .)",
  "trivy image --scanners vuln --ignore-unfixed --ignorefile .trivyignore --severity HIGH,CRITICAL --exit-code 1 bgagent-local:latest",
]

[tasks.quality]
description = "Run quality checks"
run = [
    { task = "lint:fix" },
    { task = "format" },
    { task = "typecheck" },
    { task = "test" },
]

[tasks.security]
description = "Run security scans"
run = [
    { task = "security:bandit" },
    { task = "security:image" },
]

# LOCAL DEVELOPMENT (DynamoDB Local for progress events)

[tasks."local:up"]
description = "Start DynamoDB Local and create tables for local agent testing"
run = [
  "docker compose up -d",
  "bash scripts/create-local-tables.sh",
]

[tasks."local:down"]
description = "Stop DynamoDB Local (all data is ephemeral)"
run = "docker compose down"

[tasks."local:events"]
description = "Query progress events from DynamoDB Local"
run = """
aws dynamodb scan \
  --table-name TaskEventsTable \
  --endpoint-url http://localhost:8000 \
  --region us-east-1 \
  --no-cli-pager \
  --output table 2>/dev/null || echo "No events found (is DynamoDB Local running?)"
"""

[tasks."local:events:json"]
description = "Query progress events from DynamoDB Local (JSON)"
run = """
aws dynamodb scan \
  --table-name TaskEventsTable \
  --endpoint-url http://localhost:8000 \
  --region us-east-1 \
  --no-cli-pager \
  --output json 2>/dev/null || echo "{}"
"""
