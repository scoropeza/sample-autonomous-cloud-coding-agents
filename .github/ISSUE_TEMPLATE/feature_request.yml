---
name: "🚀 Feature Request"
description: Suggest an idea for ABCA
title: "(component): (short issue description)"
labels: [feature-request, needs-triage]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an idea. You may want to check the [ROADMAP](https://github.com/krokoko/bgagent/blob/main/docs/guides/ROADMAP.md) and [design docs](https://github.com/krokoko/bgagent/tree/main/docs/design) to see if something similar is already planned.
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Where would this feature apply?
      options:
        - CDK / infrastructure
        - Agent (Python runtime)
        - Scripts / CLI
        - API or orchestration
        - Documentation
        - Other
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear and concise description of the feature you are proposing.
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: "Why do you need this? For example: I'm always frustrated when..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: |
        How could this be implemented? Include a sketch, prototype, or reference if you have one.
    validations:
      required: false
  - type: textarea
    id: other
    attributes:
      label: Other information
      description: Alternatives considered, related issues, links for context.
    validations:
      required: false
  - type: checkboxes
    id: ack
    attributes:
      label: Acknowledgements
      options:
        - label: I may be able to implement this feature
          required: false
        - label: This might be a breaking change
          required: false
